---
# tasks for deploying obagent on OceanBase observer nodes

- name: Ensure admin user exists for obagent package ownership
  ansible.builtin.user:
    name: admin
    shell: /bin/bash
    create_home: yes
    state: present
  tags: obagent

- name: Configure OceanBase community YUM repository for obagent
  ansible.builtin.yum_repository:
    name: oceanbase-community-stable
    description: OceanBase Community Stable EL8 Repository
    baseurl: https://mirrors.oceanbase.com/community/stable/el/8/x86_64/
    gpgcheck: no
    enabled: yes
  tags: obagent

- name: Install obagent package
  ansible.builtin.yum:
    name: obagent
    state: present
  tags: obagent

- name: Detect installed obagent control binary path
  ansible.builtin.shell: |
    ctl_path="$(rpm -ql obagent | grep -E '/ob_agentctl$' | grep -v '^/home/' | head -n1 || true)"
    if [ -z "$ctl_path" ]; then
      ctl_path="$(rpm -ql obagent | grep -E -m1 '/ob_agentctl$' || true)"
    fi
    echo "$ctl_path"
  args:
    executable: /bin/bash
  register: obagent_ctl_path_cmd
  changed_when: false
  tags: obagent

- name: Fail when ob_agentctl path cannot be detected
  ansible.builtin.fail:
    msg: "Cannot locate ob_agentctl from installed obagent package"
  when: (obagent_ctl_path_cmd.stdout | default('') | trim | length) == 0
  tags: obagent

- name: Set obagent path facts
  ansible.builtin.set_fact:
    obagent_ctl_path: "{{ obagent_ctl_path_cmd.stdout | trim }}"
    obagent_home_dir: "{{ (obagent_ctl_path_cmd.stdout | trim) | regex_replace('/bin/ob_agentctl$', '') }}"
    obagent_ctl_under_home: "{{ (obagent_ctl_path_cmd.stdout | trim) is match('^/home/') }}"
  tags: obagent

- name: Ensure home directories are traversable for obagent runtime
  ansible.builtin.file:
    path: "{{ item.path }}"
    mode: "{{ item.mode }}"
    state: directory
  loop:
    - { path: "/home/admin", mode: "0755" }
    - { path: "{{ obagent_home_dir }}", mode: "0755" }
    - { path: "{{ obagent_home_dir }}/bin", mode: "0755" }
  when: obagent_ctl_under_home
  tags: obagent

- name: Ensure ob_agentctl is executable
  ansible.builtin.file:
    path: "{{ obagent_ctl_path }}"
    mode: '0755'
    state: file
  tags: obagent

- name: Ensure obagent systemd service points to detected binary path
  ansible.builtin.replace:
    path: /usr/lib/systemd/system/obagent.service
    regexp: '^ExecStart=.*$'
    replace: 'ExecStart={{ obagent_ctl_path }} start'
  tags: obagent

- name: Ensure obagent systemd stop command path is correct
  ansible.builtin.replace:
    path: /usr/lib/systemd/system/obagent.service
    regexp: '^ExecStop=.*$'
    replace: 'ExecStop={{ obagent_ctl_path }} stop'
  tags: obagent

- name: Ensure obagent systemd reload command path is correct
  ansible.builtin.replace:
    path: /usr/lib/systemd/system/obagent.service
    regexp: '^ExecReload=.*$'
    replace: 'ExecReload={{ obagent_ctl_path }} restart'
  tags: obagent

- name: Ensure obagent systemd service runs as admin for /home-based binary
  ansible.builtin.lineinfile:
    path: /usr/lib/systemd/system/obagent.service
    regexp: '^User='
    line: 'User=admin'
    insertafter: '^\[Service\]'
  when: obagent_ctl_under_home
  tags: obagent

- name: Ensure obagent systemd service group is admin for /home-based binary
  ansible.builtin.lineinfile:
    path: /usr/lib/systemd/system/obagent.service
    regexp: '^Group='
    line: 'Group=admin'
    insertafter: '^User=admin$'
  when: obagent_ctl_under_home
  tags: obagent

- name: Disable obagent metrics basic auth for Prometheus scraping
  ansible.builtin.replace:
    path: "{{ obagent_home_dir }}/conf/config_properties/basic_auth.yaml"
    regexp: '(^\s*- key:\s*agent\.http\.basic\.auth\.metricAuthEnabled\s*\n\s*value:\s*)true'
    replace: '\1false'
  tags: obagent

- name: Enable OceanBase metrics pipeline in obagent
  ansible.builtin.replace:
    path: "{{ obagent_home_dir }}/conf/config_properties/monagent_pipeline.yaml"
    regexp: '(^\s*- key:\s*monagent\.pipeline\.ob\.status\s*\n\s*value:\s*)inactive'
    replace: '\1active'
  tags: obagent

- name: Set obagent monitor user for OceanBase metrics
  ansible.builtin.replace:
    path: "{{ obagent_home_dir }}/conf/config_properties/monagent_pipeline.yaml"
    regexp: '(^\s*- key:\s*monagent\.ob\.monitor\.user\s*\n\s*value:\s*).*$'
    replace: '\1ocp_monitor'
  tags: obagent

- name: Clear obagent monitor password value when encryption is enabled
  ansible.builtin.replace:
    path: "{{ obagent_home_dir }}/conf/config_properties/monagent_pipeline.yaml"
    regexp: '(^\s*- key:\s*monagent\.ob\.monitor\.password\s*\n\s*value:\s*).*$'
    replace: '\1""'
  tags: obagent

- name: Set obagent host IP
  ansible.builtin.replace:
    path: "{{ obagent_home_dir }}/conf/config_properties/monagent_pipeline.yaml"
    regexp: '(^\s*- key:\s*monagent\.host\.ip\s*\n\s*value:\s*).*$'
    replace: '\1{{ private_ip | default(ansible_host) }}'
  tags: obagent

- name: Set obagent cluster name
  ansible.builtin.replace:
    path: "{{ obagent_home_dir }}/conf/config_properties/monagent_pipeline.yaml"
    regexp: '(^\s*- key:\s*monagent\.ob\.cluster\.name\s*\n\s*value:\s*).*$'
    replace: '\1{{ oceanbase_cluster_name | default("ob_cluster") }}'
  tags: obagent

- name: Set obagent OceanBase data path
  ansible.builtin.replace:
    path: "{{ obagent_home_dir }}/conf/config_properties/monagent_pipeline.yaml"
    regexp: '(^\s*- key:\s*ob\.data\.path\s*\n\s*value:\s*).*$'
    replace: '\1/oceanbase/data'
  tags: obagent

- name: Set obagent OceanBase log path
  ansible.builtin.replace:
    path: "{{ obagent_home_dir }}/conf/config_properties/monagent_pipeline.yaml"
    regexp: '(^\s*- key:\s*ob\.log\.path\s*\n\s*value:\s*).*$'
    replace: '\1/oceanbase/redo'
  tags: obagent

- name: Reload systemd and start obagent
  ansible.builtin.systemd:
    name: obagent.service
    daemon_reload: yes
    enabled: yes
    state: restarted
  register: obagent_service_restart
  failed_when: false
  tags: obagent

- name: Check obagent active state after restart
  ansible.builtin.command: systemctl is-active obagent.service
  register: obagent_service_active
  changed_when: false
  failed_when: false
  tags: obagent

- name: Fallback to inactive OB pipeline when obagent start fails
  ansible.builtin.replace:
    path: "{{ obagent_home_dir }}/conf/config_properties/monagent_pipeline.yaml"
    regexp: '(^\s*- key:\s*monagent\.pipeline\.ob\.status\s*\n\s*value:\s*)active'
    replace: '\1inactive'
  when: obagent_service_active.stdout != 'active'
  tags: obagent

- name: Retry start obagent after fallback config
  ansible.builtin.systemd:
    name: obagent.service
    daemon_reload: yes
    enabled: yes
    state: restarted
  register: obagent_service_retry_restart
  failed_when: false
  when: obagent_service_active.stdout != 'active'
  tags: obagent

- name: Check obagent active state after fallback retry
  ansible.builtin.command: systemctl is-active obagent.service
  register: obagent_service_retry_active
  changed_when: false
  failed_when: false
  when: obagent_service_active.stdout != 'active'
  tags: obagent

- name: Capture obagent service status on failure
  ansible.builtin.command: systemctl --no-pager -l status obagent.service
  register: obagent_service_status
  changed_when: false
  failed_when: false
  when:
    - obagent_service_active.stdout != 'active'
    - obagent_service_retry_active is not defined or obagent_service_retry_active.stdout != 'active'
  tags: obagent

- name: Capture obagent journal on failure
  ansible.builtin.command: journalctl -xeu obagent.service --no-pager -n 60
  register: obagent_service_journal
  changed_when: false
  failed_when: false
  when:
    - obagent_service_active.stdout != 'active'
    - obagent_service_retry_active is not defined or obagent_service_retry_active.stdout != 'active'
  tags: obagent

- name: Fail when obagent still cannot start
  ansible.builtin.fail:
    msg: |
      obagent.service failed to start.
      systemctl status:
      {{ obagent_service_status.stdout | default('n/a') }}

      journalctl excerpt:
      {{ obagent_service_journal.stdout | default('n/a') }}
  when:
    - obagent_service_active.stdout != 'active'
    - obagent_service_retry_active is not defined or obagent_service_retry_active.stdout != 'active'
  tags: obagent