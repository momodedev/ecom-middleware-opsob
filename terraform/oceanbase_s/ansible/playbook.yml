---
# =============================================================================
# Deploy OceanBase Standalone Edition on Rocky Linux 9 (Azure D16s_v6)
# =============================================================================
# Usage:
#   ansible-playbook -i inventory.ini playbook.yml \
#       [-e ob_root_password=YourPassword] [-e ob_memory_limit=58G]
# =============================================================================

- name: Wait for SSH to become available
  hosts: ob_standalone
  gather_facts: false
  become: false
  tasks:
    - name: Wait for SSH to become available (via SSH transport)
      wait_for_connection:
        delay: 5
        timeout: 300
        sleep: 10

    - name: Verify SSH connectivity
      raw: echo "SSH OK"
      changed_when: false
    - name: Wait for cloud-init to finish
      command: cloud-init status --wait
      become: true
      become_user: root
      changed_when: false

# -----------------------------------------------------------------------------
- name: Verify data-disk mounts
  hosts: ob_standalone
  become: true
  vars:
    ob_mount_options: "defaults,noatime,nodiratime,nofail"
  tasks:
    - name: Ensure /oceanbase/data is mounted
      mount:
        path: /oceanbase/data
        src: LABEL=ob-data
        fstype: ext4
        opts: "{{ ob_mount_options }}"
        state: mounted
      ignore_errors: true   # cloud-init mount script may have already done this

    - name: Ensure /oceanbase/redo is mounted
      mount:
        path: /oceanbase/redo
        src: LABEL=ob-redo
        fstype: ext4
        opts: "{{ ob_mount_options }}"
        state: mounted
      ignore_errors: true

    - name: Fix ownership on OceanBase directories
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ ob_admin_username }}"
        group: "{{ ob_admin_username }}"
        mode: "0755"
      loop:
        - /oceanbase/data
        - /oceanbase/redo
        - /oceanbase/server
        - /var/log/oceanbase

# -----------------------------------------------------------------------------
- name: Configure OS for OceanBase
  hosts: ob_standalone
  become: true
  tasks:
    - name: Ensure firewalld is installed
      package:
        name: firewalld
        state: present

    - name: Ensure firewalld is enabled and running
      service:
        name: firewalld
        enabled: true
        state: started

    - name: Check required OceanBase ports in firewalld
      command: firewall-cmd --permanent --query-port={{ item }}
      register: firewall_port_checks
      changed_when: false
      failed_when: false
      loop:
        - 2881/tcp
        - 2882/tcp

    - name: Open required OceanBase ports in firewalld
      command: firewall-cmd --permanent --add-port={{ item.item }}
      loop: "{{ firewall_port_checks.results }}"
      when: item.rc != 0
      register: firewall_port_adds
      changed_when: item.rc != 0

    - name: Reload firewalld when rules changed
      command: firewall-cmd --reload
      when: firewall_port_adds is defined and (firewall_port_adds.results | selectattr('changed') | list | length) > 0

    - name: Persist SELinux disabled
      lineinfile:
        path: /etc/selinux/config
        regexp: '^SELINUX='
        line: SELINUX=disabled

    - name: Disable SELinux for current boot
      command: setenforce 0
      changed_when: false
      failed_when: false

    - name: Apply sysctl settings for OceanBase
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_set: true
        state: present
        reload: true
      loop:
        - { key: "fs.aio-max-nr",            value: "1048576" }
        - { key: "net.core.somaxconn",        value: "2048" }
        - { key: "net.core.netdev_max_backlog", value: "10000" }
        - { key: "net.core.rmem_default",     value: "16777216" }
        - { key: "net.core.wmem_default",     value: "16777216" }
        - { key: "net.core.rmem_max",         value: "16777216" }
        - { key: "net.core.wmem_max",         value: "16777216" }
        - { key: "net.ipv4.tcp_syncookies",   value: "1" }
        - { key: "vm.swappiness",             value: "0" }
        - { key: "vm.min_free_kbytes",        value: "2097152" }
        - { key: "vm.overcommit_memory",      value: "0" }
        - { key: "fs.file-max",               value: "6573688" }
        - { key: "vm.max_map_count",          value: "655360" }

    - name: Ensure file-descriptor limits file exists
      copy:
        dest: /etc/security/limits.d/90-oceanbase.conf
        content: |
          {{ ob_admin_username }} soft nofile 655350
          {{ ob_admin_username }} hard nofile 655350
          {{ ob_admin_username }} soft nproc  655360
          {{ ob_admin_username }} hard nproc  655360
          {{ ob_admin_username }} soft stack  unlimited
          {{ ob_admin_username }} hard stack  unlimited
          root soft nofile 655350
          root hard nofile 655350
        mode: "0644"

    - name: Disable Transparent Huge Pages immediately
      shell: |
        echo never > /sys/kernel/mm/transparent_hugepage/enabled || true
        echo never > /sys/kernel/mm/transparent_hugepage/defrag  || true
      changed_when: false

# -----------------------------------------------------------------------------
- name: Install OBD and deploy OceanBase Standalone
  hosts: ob_standalone
  become: true
  vars:
    ob_mysql_port:      2881
    ob_rpc_port:        2882
    ob_memory_limit:    "58G"
    ob_benchmark_db:    "sbtest"
    ob_optimize_index_partition: true
    # Index policy for sbtest tables: on=create idx_k_c, off=drop idx_k_c
    ob_index_strategy: "on"
    ob_home_dir:        "/home/{{ ob_admin_username }}/oceanbase"
    ob_data_dir:        "/oceanbase/data"
    ob_redo_dir:        "/oceanbase/redo"
    # OBD all-in-one installer URL (EL9 / x86_64).
    # OceanBase All-in-One v4.5.0 package (requested target version).
    obd_all_in_one_url: >-
      https://obbusiness-private.oss-cn-shanghai.aliyuncs.com/download-center/opensource/oceanbase-all-in-one/8/x86_64/oceanbase-all-in-one-4.5.0_20260203.el8.x86_64.tar.gz
    obd_install_dir:    "/tmp/obd-install"

  tasks:
    # -------------------------------------------------------------------------
    # 1. Install OBD via all-in-one package
    # -------------------------------------------------------------------------
    - name: Create OBD install staging directory
      file:
        path: "{{ obd_install_dir }}"
        state: directory
        mode: "0755"

    - name: Download OceanBase all-in-one installer
      get_url:
        url: "{{ obd_all_in_one_url }}"
        dest: "{{ obd_install_dir }}/oceanbase-all-in-one.tar.gz"
        timeout: 600
        mode: "0644"
      register: obd_download

    - name: Extract all-in-one installer
      unarchive:
        src: "{{ obd_install_dir }}/oceanbase-all-in-one.tar.gz"
        dest: "{{ obd_install_dir }}"
        remote_src: true

    - name: Locate OBD install.sh
      find:
        paths: "{{ obd_install_dir }}"
        patterns: install.sh
        file_type: file
        recurse: true
      register: obd_install_sh_files

    - name: Set OBD installer directory
      set_fact:
        obd_installer_dir: "{{ (obd_install_sh_files.files | map(attribute='path') | list | first) | dirname }}"
      when: (obd_install_sh_files.files | length) > 0

    - name: Fail when OBD installer script is missing
      fail:
        msg: "Unable to find install.sh under {{ obd_install_dir }} after extracting {{ obd_all_in_one_url }}"
      when: (obd_install_sh_files.files | length) == 0

    - name: Run OBD install.sh as root
      become_user: root
      shell: |
        cd {{ obd_installer_dir }}
        bash install.sh
      args:
        creates: "/usr/bin/obd"

    # -------------------------------------------------------------------------
    # 2. Write OBD deployment config
    # -------------------------------------------------------------------------
    - name: Create OBD config directory for admin user
      become_user: "{{ ob_admin_username }}"
      file:
        path: "/home/{{ ob_admin_username }}/.obd/cluster"
        state: directory
        mode: "0750"

    - name: Write OBD standalone config file
      become_user: "{{ ob_admin_username }}"
      copy:
        dest: "/home/{{ ob_admin_username }}/ob-standalone.yaml"
        mode: "0640"
        content: |
          oceanbase-ce:
            version: 4.5.0.0
            servers:
              - name: node1
                ip: 127.0.0.1
            global:
              home_path: {{ ob_home_dir }}
              data_dir:  {{ ob_data_dir }}
              redo_dir:  {{ ob_redo_dir }}
              log_dir:   /var/log/oceanbase
              mysql_port: {{ ob_mysql_port }}
              rpc_port:   {{ ob_rpc_port }}
              zone:       zone1
              cluster_id: 1
              memory_limit:   {{ ob_memory_limit }}
              system_memory:  2G
              datafile_size:  50G
              log_disk_size:  50G
              cpu_count:      14
              root_password:  "{{ ob_root_password }}"
              production_mode: false

    # -------------------------------------------------------------------------
    # 3. Deploy and start OceanBase
    # -------------------------------------------------------------------------
    - name: Deploy OceanBase standalone cluster with OBD
      become_user: "{{ ob_admin_username }}"
      shell: |
        source ~/.oceanbase-all-in-one/bin/env.sh
        # Force deploy allows reusing hosts where data dir contains stale files from previous runs.
        obd cluster deploy -f {{ ob_cluster_name }} -c ~/ob-standalone.yaml
      args:
        creates: "/home/{{ ob_admin_username }}/.obd/cluster/{{ ob_cluster_name }}"
      register: ob_deploy

    - name: Start OceanBase standalone cluster
      become_user: "{{ ob_admin_username }}"
      shell: |
        source ~/.oceanbase-all-in-one/bin/env.sh
        obd cluster start {{ ob_cluster_name }}
      register: ob_start
      changed_when: "'started' in ob_start.stdout | lower"

    # -------------------------------------------------------------------------
    # 4. Post-start system parameter tuning
    # -------------------------------------------------------------------------
    - name: Apply OceanBase system parameter tuning
      become_user: "{{ ob_admin_username }}"
      shell: |
        source ~/.oceanbase-all-in-one/bin/env.sh
        obclient -h127.0.0.1 -P{{ ob_mysql_port }} -uroot@sys -p'{{ ob_root_password }}' \
          -Doceanbase -A 2>/dev/null << 'OBEOF'
        -- Keep memory_limit aligned with host capacity policy for D16s_v6
        ALTER SYSTEM SET memory_limit = '58G';
        -- Raise worker thread concurrency to handle high-concurrency RW workloads
        ALTER SYSTEM SET cpu_quota_concurrency = 16;
        -- Increase MemStore buffer to reduce minor compaction pressure (60% of memory_limit)
        ALTER SYSTEM SET memstore_limit_percentage = 60;
        -- Lower freeze trigger to reduce MemStore scan overhead for read-heavy traffic
        ALTER SYSTEM SET freeze_trigger_percentage = 15;
        -- Reduce minor compaction frequency for mixed RW pressure
        ALTER SYSTEM SET minor_compact_trigger = 5;
        -- Reduce overhead from SQL audit/perf event collection in benchmark mode
        ALTER SYSTEM SET enable_sql_audit = False;
        ALTER SYSTEM SET enable_perf_event = False;
        -- Improve plan reuse behavior under stable benchmark SQL patterns
        ALTER SYSTEM SET enable_adaptive_plan_cache = True;
        -- Limit background compaction threads to protect foreground workloads
        -- (merge_thread_count removed in OceanBase 4.x; use compaction_*_thread_score instead)
        ALTER SYSTEM SET compaction_mid_thread_score = 2;
        ALTER SYSTEM SET compaction_low_thread_score = 2;
        OBEOF
      register: ob_tune
      changed_when: true

    - name: Verify applied tuning parameters
      become_user: "{{ ob_admin_username }}"
      shell: |
        source ~/.oceanbase-all-in-one/bin/env.sh
        obclient -h127.0.0.1 -P{{ ob_mysql_port }} -uroot@sys -p'{{ ob_root_password }}' \
          -Doceanbase -A -e \
          "SELECT name, value FROM oceanbase.GV\$OB_PARAMETERS
           WHERE name IN ('memory_limit','cpu_quota_concurrency','memstore_limit_percentage',
                          'freeze_trigger_percentage','minor_compact_trigger',
                          'enable_sql_audit','enable_perf_event','enable_adaptive_plan_cache',
                          'compaction_mid_thread_score','compaction_low_thread_score')
           ORDER BY name;" 2>/dev/null
      register: ob_tune_verify
      changed_when: false

    - name: Show tuning verification
      debug:
        msg: "{{ ob_tune_verify.stdout_lines }}"

    # -------------------------------------------------------------------------
    # 5. Index & partition strategy optimization for benchmark schema
    # -------------------------------------------------------------------------
    - name: Check index usage baseline via EXPLAIN ANALYZE (sample)
      become_user: "{{ ob_admin_username }}"
      shell: |
        source ~/.oceanbase-all-in-one/bin/env.sh
        obclient -h127.0.0.1 -P{{ ob_mysql_port }} -uroot@sys -p'{{ ob_root_password }}' \
          -D{{ ob_benchmark_db }} -A << 'OBEOF'
        EXPLAIN ANALYZE SELECT id, k, c FROM sbtest1 WHERE k BETWEEN 100 AND 200 ORDER BY k LIMIT 20;
        OBEOF
      register: ob_explain_sample
      changed_when: false
      failed_when: false
      when: ob_optimize_index_partition | bool

    - name: Apply index strategy on sbtest tables (create/drop idx_k_c)
      become_user: "{{ ob_admin_username }}"
      shell: |
        set -e
        source ~/.oceanbase-all-in-one/bin/env.sh
        obclient -h127.0.0.1 -P{{ ob_mysql_port }} -uroot@sys -p'{{ ob_root_password }}' \
          -Doceanbase -A -N -e \
          "SELECT table_name FROM information_schema.tables
           WHERE table_schema='{{ ob_benchmark_db }}' AND table_name LIKE 'sbtest%'
           ORDER BY table_name;" 2>/dev/null | while read -r tbl; do
          [ -n "$tbl" ] || continue
          idx_cnt=$(obclient -h127.0.0.1 -P{{ ob_mysql_port }} -uroot@sys -p'{{ ob_root_password }}' \
            -Doceanbase -A -N -e \
            "SELECT COUNT(*)
             FROM information_schema.statistics
             WHERE table_schema='{{ ob_benchmark_db }}'
               AND table_name='${tbl}'
               AND index_name='idx_k_c';" 2>/dev/null)
          if [ "{{ ob_index_strategy }}" = "on" ]; then
            if [ "${idx_cnt:-0}" = "0" ]; then
              obclient -h127.0.0.1 -P{{ ob_mysql_port }} -uroot@sys -p'{{ ob_root_password }}' \
                -D{{ ob_benchmark_db }} -A -e "CREATE INDEX idx_k_c ON ${tbl} (k, c);" 2>/dev/null
              echo "created:${tbl}:idx_k_c"
            else
              echo "exists:${tbl}:idx_k_c"
            fi
          else
            if [ "${idx_cnt:-0}" != "0" ]; then
              obclient -h127.0.0.1 -P{{ ob_mysql_port }} -uroot@sys -p'{{ ob_root_password }}' \
                -D{{ ob_benchmark_db }} -A -e "DROP INDEX idx_k_c ON ${tbl};" 2>/dev/null
              echo "dropped:${tbl}:idx_k_c"
            else
              echo "missing:${tbl}:idx_k_c"
            fi
          fi
        done
      register: ob_index_optimize
      changed_when: "'created:' in ob_index_optimize.stdout or 'dropped:' in ob_index_optimize.stdout"
      when: ob_optimize_index_partition | bool

    - name: Check partition strategy and PK/UK subset compliance
      become_user: "{{ ob_admin_username }}"
      shell: |
        source ~/.oceanbase-all-in-one/bin/env.sh
        obclient -h127.0.0.1 -P{{ ob_mysql_port }} -uroot@sys -p'{{ ob_root_password }}' \
          -Doceanbase -A << 'OBEOF'
        SELECT table_name, partition_name, subpartition_name, partition_method
        FROM information_schema.partitions
        WHERE table_schema='{{ ob_benchmark_db }}' AND table_name LIKE 'sbtest%'
        ORDER BY table_name, partition_ordinal_position, subpartition_ordinal_position;

        SELECT kcu.table_name,
               kcu.constraint_name,
               GROUP_CONCAT(kcu.column_name ORDER BY kcu.ordinal_position) AS key_columns,
               IFNULL(GROUP_CONCAT(sp.column_name ORDER BY sp.seq_in_index), '') AS partition_columns,
               CASE
                 WHEN COUNT(sp.column_name)=0 THEN 'NO_PARTITION'
                 ELSE 'CHECK_REQUIRED'
               END AS partition_key_subset_status
        FROM information_schema.table_constraints tc
        JOIN information_schema.key_column_usage kcu
          ON tc.constraint_schema=kcu.constraint_schema
         AND tc.table_name=kcu.table_name
         AND tc.constraint_name=kcu.constraint_name
        LEFT JOIN information_schema.statistics sp
          ON sp.table_schema=kcu.table_schema
         AND sp.table_name=kcu.table_name
         AND sp.index_name='PRIMARY'
        WHERE tc.table_schema='{{ ob_benchmark_db }}'
          AND tc.table_name LIKE 'sbtest%'
          AND tc.constraint_type IN ('PRIMARY KEY','UNIQUE')
        GROUP BY kcu.table_name, kcu.constraint_name
        ORDER BY kcu.table_name, kcu.constraint_name;
        OBEOF
      register: ob_partition_check
      changed_when: false
      failed_when: false
      when: ob_optimize_index_partition | bool

    - name: Show index and partition optimization summary
      debug:
        msg:
          - "EXPLAIN ANALYZE sample: {{ (ob_explain_sample.stdout_lines | default([]))[:20] }}"
          - "Index strategy: {{ ob_index_strategy }}"
          - "Index optimization summary: {{ ob_index_optimize.stdout_lines | default([]) }}"
          - "Partition check summary: {{ (ob_partition_check.stdout_lines | default([]))[:40] }}"
      when: ob_optimize_index_partition | bool

    - name: Display post-deployment connection info
      debug:
        msg:
          - "============================================================="
          - "OceanBase Standalone deployed successfully!"
          - "Connect (from this host): mysql -h127.0.0.1 -P{{ ob_mysql_port }} -uroot@sys -p{{ ob_root_password }}"
          - "Connect (from outside):   mysql -h<PUBLIC_IP>  -P{{ ob_mysql_port }} -uroot@sys -p{{ ob_root_password }}"
          - "OBD status:  obd cluster list"
          - "OBD display: obd cluster display {{ ob_cluster_name }}"
          - "============================================================="
